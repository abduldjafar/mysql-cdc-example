[[databases]]
name = "fintech_db"
# URL dibaca dari environment variable DATABASE_URL_CDC saat startup
# Format: mysql://user:password@host:port/  (tanpa nama database di path)
url = "${DATABASE_URL_CDC}"
server_id = 2
exclude_tables = ["migrations", "audit_logs"]

  # Override per-tabel jika diperlukan (primary_key digunakan untuk auto-create DDL)
  [[databases.tables]]
  name = "wallets"
  primary_key = "wallet_id"

  [[databases.tables]]
  name = "transactions"
  primary_key = "tx_id"